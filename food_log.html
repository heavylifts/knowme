<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KnowMe">
<title>KnowMe — Food Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0e;--sur:#1a1a18;--sur2:#232320;--bdr:#2e2e2a;--bdr2:#3d3d38;
  --acc:#c8f064;--acc-d:rgba(200,240,100,.12);
  --txt:#f0ede4;--txt2:#8a8878;--txt3:#5a5a50;
  --warn:#f0a050;--warn-d:rgba(240,160,80,.12);
  --ok:#1D9E75;--ok-d:rgba(29,158,117,.12);
  --err:#e05050;--err-d:rgba(224,80,80,.1);
  --r:10px;--rsm:6px;
  --tally-h:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:calc(var(--tally-h) + env(safe-area-inset-bottom,0px) + 16px)}

/* HEADER */
header{padding:16px 16px 10px;padding-top:calc(env(safe-area-inset-top,0px)+14px);display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--bdr)}
header h1{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-.3px}
.hdate{font-size:11px;color:var(--txt2);font-family:'DM Mono',monospace;margin-top:2px}
.hbtn{background:var(--sur2);border:1px solid var(--bdr2);color:var(--txt2);font-size:12px;padding:6px 12px;border-radius:var(--rsm);font-family:'DM Mono',monospace;cursor:pointer}

/* NOTION LINK */
.nlink{margin:10px 16px 6px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;text-decoration:none}
.nlink .nl{display:flex;align-items:center;gap:10px}
.nlink .ni{width:26px;height:26px;background:var(--sur2);border:1px solid var(--bdr2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.nlink .t1{font-size:13px;font-weight:500;color:var(--txt)}
.nlink .t2{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace}

/* PINNED TALLY */
.tally{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--sur);
  border-top:1px solid var(--bdr2);
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  z-index:100;
}
.tally-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tally-item{}
.tally-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:flex;justify-content:space-between;align-items:baseline}
.tally-label span{font-size:10px;font-weight:500;font-family:'DM Mono',monospace}
.tally-label span.hit{color:var(--ok)}
.tally-label span.warn{color:var(--warn)}
.tally-label span.miss{color:var(--txt2)}
.tbar-bg{height:5px;background:var(--sur2);border-radius:3px;overflow:visible;position:relative}
.tbar-fill{height:100%;border-radius:3px;transition:width .4s ease;min-width:0}
.tbar-tick{position:absolute;top:-3px;width:1.5px;height:11px;background:var(--txt3);border-radius:1px;opacity:.4}
.tally-nums{font-size:10px;font-family:'DM Mono',monospace;color:var(--txt3);margin-top:2px;display:flex;justify-content:space-between}
.tally-nums .gap{font-weight:500}
.tally-nums .gap.hit{color:var(--ok)}
.tally-nums .gap.warn{color:var(--warn)}
.tally-nums .gap.miss{color:var(--txt2)}

/* SCROLL AREA */
.scroll{padding:6px 16px;display:flex;flex-direction:column;gap:10px}

/* MEAL CARD */
.meal-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:border-color .2s,opacity .2s}
.meal-card.active{border-color:var(--bdr2)}
.meal-card.logged{border-color:var(--ok);opacity:1}
.meal-card.skipped{opacity:.45}

/* MEAL HEADER */
.meal-header{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.meal-toggle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bdr2);background:var(--sur2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.meal-toggle.on{background:var(--acc-d);border-color:var(--acc)}
.meal-toggle svg{display:none;width:12px;height:12px}
.meal-toggle.on svg{display:block}
.meal-toggle.logged-icon{background:var(--ok-d);border-color:var(--ok)}
.meal-toggle.logged-icon svg{display:block;color:var(--ok)}
.meal-title{flex:1}
.meal-title .mt{font-size:13px;font-weight:500;color:var(--txt)}
.meal-title .ms{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;margin-top:1px}
.meal-status-badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:10px;flex-shrink:0}
.badge-off{background:var(--sur2);color:var(--txt3)}
.badge-ready{background:var(--acc-d);color:var(--acc)}
.badge-logged{background:var(--ok-d);color:var(--ok)}
.badge-skipped{background:var(--sur2);color:var(--txt3)}

/* MEAL BODY */
.meal-body{display:none;border-top:1px solid var(--bdr)}
.meal-body.open{display:block}

/* MEAL SUMMARY (after logging) */
.meal-summary{padding:10px 14px;background:var(--ok-d);border-top:1px solid var(--ok);display:none}
.meal-summary.show{display:block}
.meal-summary .ms-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--ok);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.meal-summary .ms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.meal-summary .ms-item{text-align:center}
.meal-summary .ms-val{font-size:14px;font-weight:500;font-family:'DM Mono',monospace;color:var(--ok)}
.meal-summary .ms-lbl{font-size:9px;color:rgba(29,158,117,.7);margin-top:1px}

.chips{padding:10px 14px 6px;display:flex;flex-direction:column;gap:5px}
.crow{display:flex;flex-wrap:wrap;gap:5px}

.chip{font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--txt2);cursor:pointer;user-select:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.chip.on{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}
.chip.gluten:not(.on)::after{content:'⚠';font-size:9px;opacity:.5;margin-left:2px}
.chip.gluten.on{background:var(--warn-d);border-color:var(--warn);color:var(--warn)}
.qbadge{display:none;background:rgba(200,240,100,.2);color:var(--acc);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;border-radius:10px;padding:1px 5px}
.chip.on .qbadge{display:inline-block}
.chip.gluten.on .qbadge{background:rgba(240,160,80,.2);color:var(--warn)}

.xinput{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--txt);font-size:13px;padding:8px 10px;font-family:'DM Sans',sans-serif;resize:none;min-height:38px;line-height:1.5}
.xinput:focus{outline:none;border-color:var(--bdr2)}
.xinput::placeholder{color:var(--txt3)}

.counters{padding:10px 14px 6px;display:flex;gap:20px;flex-wrap:wrap}
.cg{display:flex;align-items:center;gap:8px}
.clabel{font-size:12px;color:var(--txt2);font-family:'DM Mono',monospace}
.cbtn{width:26px;height:26px;border-radius:50%;background:var(--sur2);border:1px solid var(--bdr2);color:var(--txt2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.cval{font-size:15px;font-weight:500;font-family:'DM Mono',monospace;min-width:18px;text-align:center}

/* LOG IT BUTTON */
.log-row{padding:8px 14px 12px;display:flex;gap:8px;align-items:center}
.logbtn{flex:1;background:var(--acc);color:#0f0f0e;border:none;border-radius:var(--r);font-size:13px;font-weight:500;padding:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logbtn:disabled{opacity:.5;cursor:not-allowed}
.logbtn.logging{background:var(--sur2);color:var(--txt2);border:1px solid var(--bdr2)}
.logbtn.done{background:var(--ok-d);color:var(--ok);border:1px solid var(--ok)}
.log-status{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3)}
.log-status.err{color:var(--err)}

/* QTY POPUP */
.popup{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);align-items:flex-end;justify-content:center}
.popup.show{display:flex}
.sheet{background:var(--sur);border:1px solid var(--bdr2);border-radius:18px 18px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px)+24px);width:100%;max-width:480px}
.sheet h3{font-size:15px;font-weight:500;color:var(--txt);margin-bottom:14px}
.presets{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pre{flex:1;min-width:52px;padding:10px 6px;border-radius:var(--rsm);border:1px solid var(--bdr2);background:var(--sur2);color:var(--txt2);font-size:14px;font-family:'DM Mono',monospace;text-align:center;cursor:pointer;transition:all .15s}
.pre.act{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}
.custom-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.custom-row label{font-size:12px;color:var(--txt3);white-space:nowrap}
.custom-row input{flex:1;background:var(--sur2);border:1px solid var(--bdr2);border-radius:var(--rsm);color:var(--txt);font-size:15px;font-family:'DM Mono',monospace;padding:8px 10px;text-align:center}
.custom-row input:focus{outline:none;border-color:var(--acc)}
.ulab{font-size:12px;color:var(--txt3);font-family:'DM Mono',monospace;min-width:40px}
.pbtns{display:flex;gap:8px}
.pbtn-rem{flex:1;padding:12px;border-radius:var(--r);border:1px solid var(--bdr2);background:transparent;color:var(--txt3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.pbtn-can{flex:1;padding:12px;border-radius:var(--r);border:1px solid var(--bdr2);background:var(--sur2);color:var(--txt2);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.pbtn-ok{flex:2;padding:12px;border-radius:var(--r);border:none;background:var(--acc);color:#0f0f0e;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>
</head>

    rows:[
      [
        {label:'g Greek yoghurt + berries',unit:'g',p:'150,200',def:'150',display:'Greek yoghurt + berries'},
        {label:'g Greek yoghurt + WPI scoop + berries',unit:'g',p:'150,200',def:'150',display:'Greek yoghurt + WPI + berries'},
        {label:'g Greek yoghurt + WPI scoop + banana',unit:'g',p:'150,200',def:'200',display:'Greek yoghurt + WPI + banana'},
        {label:'rice cake with peanut butter',unit:'rice cakes',p:'2,4',def:'2',display:'Rice cakes + PB'},
        {label:'scoop WPI protein shake',unit:'scoops',p:'1,2',def:'1',display:'Protein shake'},
      ],
    ],
    extra:'ex-evening'
  },
  {
    id:'drinks',
    title:'Drinks',
    sub:'',
    counters:[
      {id:'ccv',label:'coffees (cream)'},
      {id:'tcv',label:'green tea'},
    ],
    rows:[
      [
        {label:'500ml water',display:'500ml water'},
        {label:'1L water',display:'1L water'},
        {label:'cup Sancha green tea',unit:'cups',p:'1,2',def:'1',display:'Sancha green tea'},
      ],
    ],
    extra:'ex-drinks'
  },
];

// State per meal: {active, logged, macros}
const mealState={};
MEALS.forEach(m=>mealState[m.id]={active:false,logged:false,macros:null});

// Chip qty state
const chipQty=new Map();
let activeChip=null;

function fmtQty(q,unit){
  const n=parseFloat(q);
  if(unit==='g') return n+'g';
  if(unit==='cups') return n+' cup'+(n!==1?'s':'');
  if(unit==='tbsp') return n+' tbsp';
  return n+'×';
}

function updateBadge(el){
  const b=el.querySelector('.qbadge');
  if(!b) return;
  const q=chipQty.get(el);
  if(!q){b.style.display='none';return;}
  b.textContent=fmtQty(q,el.dataset.unit||'');
  b.style.display='';
}

function ct(el){
  activeChip=el;
  const isOn=el.classList.contains('on');
  const presets=(el.dataset.p||'1').split(',').map(x=>x.trim());
  const unit=el.dataset.unit||'';
  const def=el.dataset.def||presets[0];
  if(!isOn){
    chipQty.set(el,def);
    el.classList.add('on');
    updateBadge(el);
    if(presets.length===1&&!unit) return;
    showPopup(el,presets,unit,def);
  } else {
    showPopup(el,presets,unit,chipQty.get(el)||def);
  }
}

function showPopup(el,presets,unit,current){
  document.getElementById('p-title').textContent=el.querySelector('.ct-txt').textContent.trim();
  document.getElementById('p-unit').textContent=unit;
  document.getElementById('p-custom').value='';
  const container=document.getElementById('p-presets');
  container.innerHTML='';
  presets.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='pre'+(String(p)===String(current)?' act':'');
    btn.textContent=fmtQty(p,unit);
    btn.onclick=()=>{
      container.querySelectorAll('.pre').forEach(b=>b.classList.remove('act'));
      btn.classList.add('act');
      document.getElementById('p-custom').value='';
    };
    container.appendChild(btn);
  });
  document.getElementById('popup').className='popup show';
}

function confirmQty(){
  if(!activeChip){closePopup();return;}
  const custom=document.getElementById('p-custom').value.trim();
  const active=document.querySelector('#p-presets .pre.act');
  const presetVal=active?active.textContent.replace(/[^0-9.]/g,''):null;
  const qty=custom||presetVal||(activeChip.dataset.def||'1');
  chipQty.set(activeChip,qty);
  activeChip.classList.add('on');
  updateBadge(activeChip);
  closePopup();
}

function removeChip(){
  if(!activeChip){closePopup();return;}
  activeChip.classList.remove('on');
  chipQty.delete(activeChip);
  updateBadge(activeChip);
  closePopup();
}

function closePopup(){
  document.getElementById('popup').className='popup';
  activeChip=null;
}

function as(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function ac(id,d){
  const e=document.getElementById(id);
  e.textContent=Math.max(0,parseInt(e.textContent)+d);
}

// Toggle meal active state
function toggleMeal(mealId){
  const state=mealState[mealId];
  if(state.logged) return; // can't toggle a logged meal
  state.active=!state.active;
  renderMealCard(mealId);
}

// Build food log text for a specific meal card
function buildMealLog(mealId){
  const card=document.getElementById('card-'+mealId);
  const lines=[];
  card.querySelectorAll('.chip.on').forEach(el=>{
    const q=chipQty.get(el)||(el.dataset.def||'1');
    const label=el.dataset.label||el.querySelector('.ct-txt').textContent.trim();
    lines.push(q+' '+label);
  });
  // Counters
  const meal=MEALS.find(m=>m.id===mealId);
  if(meal.counters){
    meal.counters.forEach(c=>{
      const v=parseInt(document.getElementById(c.id)?.textContent||'0');
      if(v>0) lines.push(v+' '+c.label);
    });
  }
  const extra=document.getElementById(meal.extra);
  if(extra&&extra.value.trim()) lines.push(extra.value.trim());
  return lines.join(', ');
}

// Log a single meal
async function logMeal(mealId){
  const logText=buildMealLog(mealId);
  if(!logText.trim()){
    setLogStatus(mealId,'Select at least one item first','err');
    return;
  }

  const btn=document.getElementById('logbtn-'+mealId);
  const meal=MEALS.find(m=>m.id===mealId);
  btn.disabled=true;
  btn.textContent='Estimating...';
  btn.className='logbtn logging';
  setLogStatus(mealId,'Calling Claude...','');

  try {
    const res=await fetch(WORKER+'/estimate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({foodLog:meal.title+': '+logText})
    });
    const macros=await res.json();
    if(macros.error) throw new Error(macros.error);

    // Update running tally
    tally.protein+=macros.protein||0;
    tally.carbs+=macros.carbs||0;
    tally.fat+=macros.fat||0;
    tally.kcal+=macros.kcal||0;
    renderTally();

    // Store meal macros
    mealState[mealId].macros=macros;
    mealState[mealId].logged=true;
    mealState[mealId].active=false;

    // Show meal summary
    showMealSummary(mealId,meal.title,macros);

    // Sync to Notion in background
    syncToNotion();

    btn.textContent='Logged ✓';
    btn.className='logbtn done';
    setLogStatus(mealId,'','');
    renderMealCard(mealId);

  } catch(e){
    btn.disabled=false;
    btn.textContent='Retry';
    btn.className='logbtn';
    setLogStatus(mealId,'Error: '+e.message,'err');
  }
}

function setLogStatus(mealId,msg,type){
  const el=document.getElementById('logstatus-'+mealId);
  if(!el) return;
  el.textContent=msg;
  el.className='log-status'+(type?' '+type:'');
}

function showMealSummary(mealId,title,m){
  const el=document.getElementById('summary-'+mealId);
  if(!el) return;
  el.innerHTML=`
    <div class="ms-title">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ${title} logged
    </div>
    <div class="ms-grid">
      <div class="ms-item"><div class="ms-val">${m.protein}g</div><div class="ms-lbl">protein</div></div>
      <div class="ms-item"><div class="ms-val">${m.carbs}g</div><div class="ms-lbl">carbs</div></div>
      <div class="ms-item"><div class="ms-val">${m.fat}g</div><div class="ms-lbl">fat</div></div>
      <div class="ms-item"><div class="ms-val">${m.kcal}</div><div class="ms-lbl">kcal</div></div>
    </div>`;
  el.className='meal-summary show';
}

// Sync accumulated totals to Notion (create or update)
async function syncToNotion(){
  const notes=Object.entries(mealState)
    .filter(([,s])=>s.logged&&s.macros)
    .map(([id,])=>id)
    .join(', ')+' logged';

  const flags={
    trainingDay: mealState.post.logged,
    preAchilles: mealState.achilles.logged,
    postWorkout: mealState.post.logged,
    eveningSnack: mealState.evening.logged,
    glutenExposure: detectGlutenExposure()
  };

  try {
    const res=await fetch(WORKER+'/log',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        date:TODAY_ISO,
        name:TODAY_NAME,
        macros:{...tally},
        flags,
        notes,
        notionPageId
      })
    });
    const result=await res.json();
    if(result.success&&result.notionPageId){
      notionPageId=result.notionPageId;
    }
  } catch(e){
    console.log('Notion sync error:',e);
  }
}

function detectGlutenExposure(){
  const allChips=document.querySelectorAll('.chip.gluten.on');
  return allChips.length>0;
}

// Render the pinned tally
function renderTally(){
  const macros=[
    {key:'protein',label:'Protein',target:TARGETS.protein,unit:'g',id:'t-protein'},
    {key:'carbs',label:'Carbs',target:TARGETS.carbs,unit:'g',id:'t-carbs'},
    {key:'fat',label:'Fat',target:TARGETS.fat,unit:'g',id:'t-fat'},
    {key:'kcal',label:'Kcal',target:TARGETS.kcal,unit:'',id:'t-kcal'},
  ];
  macros.forEach(({key,label,target,unit,id})=>{
    const val=tally[key];
    const pct=Math.min(100,(val/target)*100);
    const tickPct=Math.min(98,(target/(target*1.3))*100);
    const gap=target-val;
    const hit=val>=target;
    const warn=val>=target*0.8&&!hit;
    const cls=hit?'hit':warn?'warn':'miss';
    const barColor=hit?'var(--ok)':warn?'var(--warn)':'#3d3d38';
    const el=document.getElementById(id);
    el.innerHTML=`
      <div class="tally-label">${label}<span class="${cls}">${val}${unit}</span></div>
      <div class="tbar-bg">
        <div class="tbar-fill" style="width:${pct}%;background:${barColor}"></div>
        <div class="tbar-tick" style="left:${tickPct}%"></div>
      </div>
      <div class="tally-nums">
        <span style="color:var(--txt3)">${target}${unit} target</span>
        <span class="gap ${cls}">${hit?'✓ met':'−'+gap+unit+' to go'}</span>
      </div>`;
  });
}

// Render a single meal card
function renderMealCard(mealId){
  const card=document.getElementById('card-'+mealId);
  const state=mealState[mealId];
  const meal=MEALS.find(m=>m.id===mealId);

  // Card class
  let cardClass='meal-card';
  if(state.logged) cardClass+=' logged';
  else if(state.active) cardClass+=' active';
  else cardClass+=' skipped';
  card.className=cardClass;

  // Toggle icon
  const tog=card.querySelector('.meal-toggle');
  if(state.logged){
    tog.className='meal-toggle logged-icon';
    tog.innerHTML=`<svg viewBox="0 0 12 12" fill="none" style="color:var(--ok)"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  } else if(state.active){
    tog.className='meal-toggle on';
    tog.innerHTML=`<svg viewBox="0 0 12 12" fill="none" style="color:var(--acc)"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  } else {
    tog.className='meal-toggle';
    tog.innerHTML='';
  }

  // Badge
  const badge=card.querySelector('.meal-status-badge');
  if(state.logged){badge.textContent='logged';badge.className='meal-status-badge badge-logged';}
  else if(state.active){badge.textContent='ready to log';badge.className='meal-status-badge badge-ready';}
  else {badge.textContent='tap to log';badge.className='meal-status-badge badge-off';}

  // Body
  const body=card.querySelector('.meal-body');
  body.className='meal-body'+(state.active?' open':'');
}

// Build all meal cards
function buildUI(){
  const list=document.getElementById('meal-list');
  list.innerHTML='';

  MEALS.forEach(meal=>{
    const card=document.createElement('div');
    card.className='meal-card skipped';
    card.id='card-'+meal.id;

    // Chip rows HTML
    let chipsHTML='';
    const rows=meal.rows||[];
    if(rows.length){
      chipsHTML='<div class="chips">';
      rows.forEach(row=>{
        chipsHTML+='<div class="crow">';
        row.forEach(chip=>{
          const gluClass=chip.gluten?' gluten':'';
          const display=chip.display||chip.label;
          const dataAttrs=chip.unit?`data-label="${chip.label}" data-unit="${chip.unit}" data-p="${chip.p}" data-def="${chip.def}"`:`data-label="${chip.label}"`;
          chipsHTML+=`<div class="chip${gluClass}" ${dataAttrs} onclick="ct(this)"><span class="ct-txt">${display}</span><span class="qbadge">${chip.def||'1'}${chip.unit==='g'?'g':chip.unit==='cups'?' cup':chip.unit==='tbsp'?' tbsp':'×'}</span></div>`;
        });
        chipsHTML+='</div>';
      });
      chipsHTML+='</div>';
    } else if(meal.chips){
      chipsHTML='<div class="chips"><div class="crow">';
      meal.chips.forEach(chip=>{
        chipsHTML+=`<div class="chip" data-label="${chip.label}" onclick="ct(this)"><span class="ct-txt">${chip.label}</span><span class="qbadge">1×</span></div>`;
      });
      chipsHTML+='</div></div>';
    }

    // Counter HTML
    let counterHTML='';
    if(meal.counters){
      counterHTML='<div class="counters">';
      meal.counters.forEach(c=>{
        counterHTML+=`<div class="cg"><span class="clabel">${c.label}</span><div class="cbtn" onclick="ac('${c.id}',-1)">−</div><span class="cval" id="${c.id}">0</span><div class="cbtn" onclick="ac('${c.id}',1)">+</div></div>`;
      });
      counterHTML+='</div>';
    }

    card.innerHTML=`
      <div class="meal-header" onclick="toggleMeal('${meal.id}')">
        <div class="meal-toggle"></div>
        <div class="meal-title">
          <div class="mt">${meal.title}</div>
          ${meal.sub?`<div class="ms">${meal.sub}</div>`:''}
        </div>
        <div class="meal-status-badge badge-off">tap to log</div>
      </div>
      <div class="meal-summary" id="summary-${meal.id}"></div>
      <div class="meal-body">
        ${counterHTML}
        ${chipsHTML}
        <div class="chips" style="padding-top:0">
          <textarea class="xinput" id="${meal.extra}" placeholder="Anything else..." rows="1" oninput="as(this)"></textarea>
        </div>
        <div class="log-row">
          <button class="logbtn" id="logbtn-${meal.id}" onclick="logMeal('${meal.id}')">Log it ↗</button>
          <span class="log-status" id="logstatus-${meal.id}"></span>
        </div>
      </div>`;

    list.appendChild(card);
  });

  renderTally();
}

function resetDay(){
  if(!confirm('Reset all meals for today?')) return;
  MEALS.forEach(m=>{mealState[m.id]={active:false,logged:false,macros:null};});
  tally.protein=0;tally.carbs=0;tally.fat=0;tally.kcal=0;
  notionPageId=null;
  chipQty.clear();
  buildUI();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
buildUI();
</script>
</body>
